# Cloud Workflows orchestrator for the taxi pipeline.
#
# Flow:  run ingest job -> read the state file it wrote -> if a NEW month was
# loaded, run the transform job (containerized `dataform run` -> silver + gold +
# assertions) for that month; otherwise finish cheaply. Gating the transform on
# "new month loaded" is what keeps daily runs ~$0 (most days are no-ops).
#
# Triggered by Cloud Scheduler (empty body => resolve latest month) or manually
# with {"target_month":"2023-02"} to force a specific month / backfill step.
main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - ingest_job: ${sys.get_env("INGEST_JOB")}
          - transform_job: ${sys.get_env("TRANSFORM_JOB")}
          - raw_bucket: ${sys.get_env("RAW_BUCKET")}
          - safe_args: {}
          - safe_args: ${default(args, safe_args)}
          - target_month: ${default(map.get(safe_args, "target_month"), "")}

    # ---- 1. Run the ingest Cloud Run job (waits for completion) ----
    - run_ingest:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + location + "/jobs/" + ingest_job}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: TARGET_MONTH
                      value: ${target_month}
        result: ingest_op

    # ---- 2. Read the state file the ingest job wrote ----
    - read_state:
        try:
          call: http.get
          args:
            url: '${"https://storage.googleapis.com/storage/v1/b/" + raw_bucket + "/o/_state%2Flast_ingest.json?alt=media"}'
            auth:
              type: OAuth2
          result: state_resp
        except:
          as: e
          steps:
            - no_state:
                return: "ingest produced no state file; nothing to transform"

    # ---- 3. Only transform if a new month was actually loaded ----
    - decide:
        switch:
          - condition: ${state_resp.body.status == "loaded"}
            next: run_transform
        next: done_skip

    # ---- 4. Run the transform job (dataform run) for the loaded month ----
    - run_transform:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + location + "/jobs/" + transform_job}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: TARGET_MONTH
                      value: ${state_resp.body.month}
        result: transform_op

    - done_ok:
        return: '${"Loaded month " + state_resp.body.month + " and ran transforms."}'
    - done_skip:
        return: "No new month to load; transforms skipped."
